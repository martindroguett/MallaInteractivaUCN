<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Malla Interactiva UCN</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: dodgerblue;">

    <div id="menu-mallas">
        <h1>Simulador de Malla UCN Coquimbo </h1>
        <h2>¡Elige tu carrera para simular la ruta más corta a tu egreso!</h2>
        <div id="botones-malla">
        <button id ="informatica" class="boton-menu">ICCI</button>
        <button id = "industrial" class="boton-menu">ICI</button>
        <button id="tecnologias" class="boton-menu">ITI</button>
        </div>
    </div>

    <div id="espacio-malla" class ="oculto">
        <div id="titulo-container">
            <h1>
            <span id="titulo-carrera" class="titulo"></span>
            </h1>
        </div>

        <div id="simulador"> 
            <h1> 
            <button id="regresar" class="button">Volver al menú</button>
            <button id="boton-simulador" class="button">Simula tu malla</button>
            </h1>
        </div>
        <div id="malla-container"></div>

        <div id="ramo-popup" class="info-card oculto">
        <h3><span id="nombreramo"></span></h3>
        <p><strong>Código:</strong> <span id="info-id"></span></p>
        <p><strong>SCT:</strong> <span id="info-sct"></span></p>
        <p><strong>Prerrequisitos:</strong> <ul id="info-pre"></ul></p>
        <p><strong>Fuerza:</strong> <ul id="info-fuerza"></ul></p>
        </div>

        <div id="overlay-simulador" class="overlay-simulador oculto">
        <div class="header-simulador">
            <h2>Simulador de ruta óptima</h2> 
            <div class="botones-simulacion"> 
                <button id="prev-semestre" class="boton-simulacion">Atrás</button>
                <span id="indicador-semestre"></span>
                <button id="sig-semestre" class="boton-simulacion">Adelante</button>
            </div>
            <button id="cerrar-simulacion" class="boton-simulacion">Salir</button>
        </div>
        <div id="malla-simulador-container"></div>
        <div id="flechas-simulador"></div>
        </div>

        <div id="leyenda"></div>
    </div>
  
    <script type="module" src="../js/main.js"></script> 
    
</body>
</html>
