<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Malla Interactiva UCN</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: dodgerblue;">
    <div id="titulo-container">
        <h1>
        <span class="titulo">MALLA DE INGENIERÍA CIVIL EN COMPUTACIÓN E INFORMÁTICA</span>
        </h1>
    </div>

    <div id="simulador"> 
        <h1> 
        <span class="button">Simula tu malla</span>
        </h1>
    </div>

    <div id="malla-container"></div>

    <div id="ramo-popup" class="info-card oculto">
    <h3><span id="nombreramo"></span></h3>
    <p><strong>Código:</strong> <span id="info-id"></span></p>
    <p><strong>SCT:</strong> <span id="info-sct"></span></p>
    <p><strong>Prerrequisitos:</strong> <ul id="info-pre"></ul></p>
    <p><strong>Fuerza:</strong> <ul id="info-fuerza"></ul></p>
    </div>

    <div id="overlay-simulador" class="overlay-simulador oculto">
        <div class="header-simulador">
        <h2>Simulador de ruta óptima</h2> 
        <button id="cerrar-simulacion">Atrás</button> 
        </div>
        <div id="malla-simulador-container" class="malla-grid"></div>
    </div>

    <div id="leyenda"></div>
    <script type="module" src="../js/main.js"></script> 
</body>
</html>
